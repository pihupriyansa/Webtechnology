<!DOCTYPE html>
<html>
<head>
    <title>Phone Style Calculator</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#e6e6e6;
            font-family:Arial;
        }

        .calculator{
            width:320px;
            background:black;
            padding:20px;
            border-radius:25px;
        }

        .display{
            width:100%;
            height:70px;
            background:black;
            color:white;
            text-align:right;
            font-size:30px;
            border:none;
            margin-bottom:20px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:12px;
            cursor: pointer;
        }

        button{
            height:65px;
            font-size:22px;
            border:none;
            border-radius:50%;
            cursor: pointer;
            
        }
        
        button:hover{
            transform:scale(1.08);
        }
        

        .operator{
            background:orange;
            color:white;
        }

        .clear{
            background:gray;
            color:black;
        }

        .zero{
            grid-column:span 2;
            border-radius:35px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>
        

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button onclick="calculate()" class="operator">=</button>

        <button class="number zero" onclick="append('0')">0</button>
        <button class="number zero" onclick="append('.')">.</button>
    </div>
</div>

<script>
    function append(value){
        document.getElementById("display").value += value;
    }

    function clearDisplay(){
        document.getElementById("display").value = "";
    }

    function calculate(){
        let expression = document.getElementById("display").value;
        try{
            document.getElementById("display").value = eval(expression);
        }
        catch{
            document.getElementById("display").value = "Error";
        }
    }
</script>

</body>
</html>
