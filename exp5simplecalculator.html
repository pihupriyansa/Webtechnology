<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <style>
    body{
        background: linear-gradient(135deg, #141E30, #243B55);
        font-family: 'Segoe UI', sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .calculator{
        background:#1c1c1c;
        padding:35px;
        border-radius:25px;
        box-shadow:0 20px 40px rgba(0,0,0,0.5);
        text-align:center;
        width:320px;
        color:white;
    }

    h2{
        margin-bottom:25px;
        font-weight:500;
        letter-spacing:1px;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px 0;
        font-size:18px;
        border-radius:12px;
        border:none;
        background:#2c2c2c;
        color:white;
        outline:none;
        box-shadow:inset 0 4px 8px rgba(0,0,0,0.4);
    }

    input::placeholder{
        color:#aaa;
    }

    button{
        width:55px;
        height:55px;
        margin:10px;
        font-size:20px;
        border:none;
        border-radius:50%;
        cursor:pointer;
        background:#333;
        color:white;
        transition:0.2s ease;
        box-shadow:0 6px 15px rgba(0,0,0,0.4);
    }

    button:hover{
        transform: scale(1.05);
        background:#ff9500;
        color:white;
    }

    #result{
        margin-top:20px;
        font-size:22px;
        font-weight:600;
        color:#ffcc70;
    }
</style>

</head>
<body>

<div class="calculator">
    <h2>Simple Calculator</h2>

    <input type="number" id="n1" placeholder="Enter first number"><br>
    <input type="number" id="n2" placeholder="Enter second number"><br>

    <button onclick="calculate('+')">+</button>
    <button onclick="calculate('-')">-</button>
    <button onclick="calculate('*')">×</button>
    <button onclick="calculate('/')">÷</button>

    <div id="result">Result: 0</div>
</div>

<script>
    function calculate(operator){

        let n1 = parseFloat(document.getElementById("n1").value);
        let n2 = parseFloat(document.getElementById("n2").value);
        let result;

        if(isNaN(n1) || isNaN(n2)){
            result = "Enter both numbers";
        }
        else if (operator == '+'){
            result = n1 + n2;
        }
        else if(operator == '-'){
            result = n1 - n2;
        }
        else if(operator == '*'){
            result = n1 * n2;
        }
        else if(operator == '/'){
            if(n2 != 0){
                result = n1 / n2;   
            }  
            else{
                result = "Cannot divide by 0";
            }
        }

        document.getElementById("result").innerHTML = "Result: " + result;
    }
</script>

</body>
</html>
