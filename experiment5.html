<!DOCTYPE html>
<html>
<head>
    <title>Calculator Links</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:linear-gradient(135deg,#000000,#1a1a2e,#16213e);
            font-family:'Segoe UI', sans-serif;
        }

        .container{
            text-align:center;
            background:#111;
            padding:50px;
            border-radius:30px;
            box-shadow:0 20px 50px rgba(0,0,0,0.8);
        }

        a{
            display:block;
            margin:25px 0;
            padding:18px 35px;
            text-decoration:none;
            font-size:20px;
            font-weight:bold;
            letter-spacing:1px;
            border-radius:50px;
            background:linear-gradient(135deg,#ff512f,#dd2476);
            color:white;
            transition:all 0.3s ease;
            box-shadow:0 10px 25px rgba(0,0,0,0.6);
        }

        a:hover{
            transform:scale(1.08);
            background:linear-gradient(135deg,#00c6ff,#0072ff);
            box-shadow:0 15px 35px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

<div class="container">
    <a href="exp5simplecalculator.html">Simple Calculator</a>
    <a href="exp5phonecalculator.html">Phone Calculator</a>
</div>

</body>
</html>
